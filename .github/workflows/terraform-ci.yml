name: "Terraform CI (Security & Plan)"

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_WORKING_DIR: terraform
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  security_and_fmt:
    name: "Security Scan & Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (Secrets Scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Format Check
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform fmt -check -recursive

  terraform_plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: security_and_fmt
    environment: ci
    env:
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_bucket_name: ${{ vars.BUCKET_NAME }}
      TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required CI environment configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          check_var() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error title=Missing GitHub Environment Variable::$name is not configured in the 'ci' environment."
              missing=1
            fi
          }

          check_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error title=Missing GitHub Environment Secret::$name is not configured in the 'ci' environment or is unavailable for this run."
              missing=1
            fi
          }

          check_var "AWS_REGION" "${{ vars.AWS_REGION }}"
          check_var "AWS_ACCOUNT_ID" "${{ vars.AWS_ACCOUNT_ID }}"
          check_var "BUCKET_NAME" "${{ vars.BUCKET_NAME }}"
          check_var "TF_STATE_BUCKET" "${{ vars.TF_STATE_BUCKET }}"

          check_secret "AWS_DEPLOY_ROLE_ARN" "${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}"
          check_secret "DATABRICKS_HOST" "${{ secrets.DATABRICKS_HOST }}"
          check_secret "DATABRICKS_TOKEN" "${{ secrets.DATABRICKS_TOKEN }}"

          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "One or more required variables/secrets are missing from the GitHub Environment 'ci'."
            echo "Fix the missing entries above and rerun the workflow."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          role-session-name: gha-terraform-plan

      - name: Generate backend.hcl
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          cat > backend.hcl <<EOF
          bucket       = "${{ vars.TF_STATE_BUCKET }}"
          key          = "${{ github.repository }}/ci/terraform.tfstate"
          region       = "${{ vars.AWS_REGION }}"
          encrypt      = true
          use_lockfile = true
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Render Plan
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform show tfplan > plan.txt

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const body = `## 📖 Terraform Plan Summary\n\`\`\`text\n${plan.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });