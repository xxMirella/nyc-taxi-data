name: "Terraform CI (Security & Plan)"

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_WORKING_DIR: terraform
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  security_and_fmt:
    name: "Security Scan & Auto-Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Gitleaks (Secrets Scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Format (Auto-Fix)
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        shell: bash
        run: terraform fmt -recursive

      - name: Commit and Push changes
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Verifica se houve mudanças após o fmt
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Formatando arquivos e subindo correções..."
            git add .
            git commit -m "chore: terraform fmt auto-fix"
            git push
          else
            echo "Arquivos já estão formatados corretamente."
          fi

  terraform_plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: security_and_fmt
    if: always()
    environment: ci
    env:
      TF_VAR_env: "ci"
      TF_VAR_databricks_principal_arn: ${{ secrets.DATABRICKS_PRINCIPAL_ARN }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_bucket_name: ${{ vars.BUCKET_NAME }}
      TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_enable_databricks_storage: ${{ vars.ENABLE_DATABRICKS_STORAGE }}
      TF_VAR_databricks_user_email: ${{ secrets.DATABRICKS_USER_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          role-session-name: gha-terraform-plan

      - name: Generate backend.hcl
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          cat > backend.hcl <<EOF
          bucket       = "${{ vars.TF_STATE_BUCKET }}"
          key          = "${{ github.repository }}/ci/terraform.tfstate"
          region       = "${{ vars.AWS_REGION }}"
          encrypt      = true
          use_lockfile = true
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Render Plan
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform show tfplan > plan.txt

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const body = `## 📖 Terraform Plan Summary\n\`\`\`text\n${plan.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });