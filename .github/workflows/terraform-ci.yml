name: "Terraform CI (Security & Plan)"

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_WORKING_DIR: terraform
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  security_and_fmt:
    name: "Security Scan & Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (Secrets Scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Format Check
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform fmt -check -recursive

  terraform_plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    needs: security_and_fmt
    environment: ci
    env:
      # Passando variáveis para o Terraform
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_bucket_name: ${{ vars.BUCKET_NAME }}
      TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
      # Adicione outras TF_VAR conforme sua necessidade...

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          role-session-name: gha-terraform-plan

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Render Plan
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        run: terraform show tfplan > plan.txt

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const body = `## 📖 Terraform Plan Summary\n\`\`\`text\n${plan.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
