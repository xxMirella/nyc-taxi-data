name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply-main
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_CLI_ARGS: "-no-color"
  TERRAFORM_WORKING_DIR: terraform

jobs:
  terraform-apply:
    name: terraform-apply
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      TF_VAR_env: "production"
      TF_VAR_enable_databricks_storage: ${{ vars.ENABLE_DATABRICKS_STORAGE }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_bucket_name: ${{ vars.BUCKET_NAME }}
      TF_VAR_bronze_prefix: ${{ vars.BRONZE_PREFIX }}
      TF_VAR_role_name: ${{ vars.ROLE_NAME }}
      TF_VAR_policy_name: ${{ vars.POLICY_NAME }}
      TF_VAR_storage_credential_name: ${{ vars.STORAGE_CREDENTIAL_NAME }}
      TF_VAR_external_location_name: ${{ vars.EXTERNAL_LOCATION_NAME }}
      TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_databricks_principal_arn: ${{ secrets.DATABRICKS_PRINCIPAL_ARN }}
      TF_VAR_databricks_external_id: ${{ secrets.DATABRICKS_EXTERNAL_ID }}
      TF_VAR_databricks_group_name: ${{ vars.DATABRICKS_GROUP_NAME }}

    defaults:
      run:
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required production environment configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          principal="${{ secrets.DATABRICKS_PRINCIPAL_ARN }}"
          external_id="${{ secrets.DATABRICKS_EXTERNAL_ID }}"

          check_var() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error title=Missing GitHub Environment Variable::$name is not configured in the 'production' environment."
              missing=1
            fi
          }

          check_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error title=Missing GitHub Environment Secret::$name is not configured in the 'production' environment or is unavailable for this run."
              missing=1
            fi
          }

          check_var "AWS_REGION" "${{ vars.AWS_REGION }}"
          check_var "AWS_ACCOUNT_ID" "${{ vars.AWS_ACCOUNT_ID }}"
          check_var "BUCKET_NAME" "${{ vars.BUCKET_NAME }}"
          check_var "BRONZE_PREFIX" "${{ vars.BRONZE_PREFIX }}"
          check_var "ROLE_NAME" "${{ vars.ROLE_NAME }}"
          check_var "POLICY_NAME" "${{ vars.POLICY_NAME }}"
          check_var "STORAGE_CREDENTIAL_NAME" "${{ vars.STORAGE_CREDENTIAL_NAME }}"
          check_var "EXTERNAL_LOCATION_NAME" "${{ vars.EXTERNAL_LOCATION_NAME }}"
          check_var "DATABRICKS_GROUP_NAME" "${{ vars.DATABRICKS_GROUP_NAME }}"
          check_var "TF_STATE_BUCKET" "${{ vars.TF_STATE_BUCKET }}"
          check_var "TF_VAR_ENABLE_DATABRICKS_STORAGE" "${{ vars.ENABLE_DATABRICKS_STORAGE }}"

          check_secret "AWS_GITHUB_ACTIONS_ROLE_ARN" "${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}"
          check_secret "DATABRICKS_HOST" "${{ secrets.DATABRICKS_HOST }}"
          check_secret "DATABRICKS_TOKEN" "${{ secrets.DATABRICKS_TOKEN }}"

          if [ "$principal" = "arn:aws:iam::000000000000:root" ]; then
            echo "::error title=Invalid Databricks Principal ARN::DATABRICKS_PRINCIPAL_ARN is still using the placeholder value arn:aws:iam::000000000000:root."
            missing=1
          fi

          if [ "$external_id" = "TEMP_EXTERNAL_ID" ]; then
            echo "::error title=Invalid Databricks External ID::DATABRICKS_EXTERNAL_ID is still using the placeholder value TEMP_EXTERNAL_ID."
            missing=1
          fi

          if [ -z "$principal" ] && [ -n "$external_id" ]; then
            echo "::error title=Invalid Databricks configuration::DATABRICKS_EXTERNAL_ID cannot be set when DATABRICKS_PRINCIPAL_ARN is empty."
            missing=1
          fi
          
          if [ -z "$principal" ]; then
            echo "::error title=Missing Databricks Principal ARN::DATABRICKS_PRINCIPAL_ARN must be configured to create the Databricks IAM role."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "One or more required variables/secrets are missing or invalid in the GitHub Environment 'production'."
            echo "Fix the missing entries above and rerun the workflow."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          role-session-name: gha-terraform-apply

      - name: Generate backend.hcl
        run: |
          set -euo pipefail
          cat > backend.hcl <<EOF
          bucket       = "${{ vars.TF_STATE_BUCKET }}"
          key          = "${{ github.repository }}/production/terraform.tfstate"
          region       = "${{ vars.AWS_REGION }}"
          encrypt      = true
          use_lockfile = true
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Apply
        run: terraform apply -auto-approve