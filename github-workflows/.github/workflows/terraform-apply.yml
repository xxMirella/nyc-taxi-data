name: terraform-apply

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply-production
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_WORKING_DIR: terraform

jobs:
  security_scan:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform_checks:
    name: Terraform checks
    runs-on: ubuntu-latest
    needs: security_scan

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_bucket_name: ${{ vars.BUCKET_NAME }}
      TF_VAR_bronze_prefix: ${{ vars.BRONZE_PREFIX }}
      TF_VAR_role_name: ${{ vars.ROLE_NAME }}
      TF_VAR_policy_name: ${{ vars.POLICY_NAME }}
      TF_VAR_storage_credential_name: ${{ vars.STORAGE_CREDENTIAL_NAME }}
      TF_VAR_external_location_name: ${{ vars.EXTERNAL_LOCATION_NAME }}
      TF_VAR_databricks_host: ${{ vars.DATABRICKS_HOST }}
      TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_databricks_principal_arn: ${{ vars.DATABRICKS_PRINCIPAL_ARN }}
      TF_VAR_databricks_external_id: ${{ vars.DATABRICKS_EXTERNAL_ID }}
      TF_VAR_databricks_group_name: ${{ vars.DATABRICKS_GROUP_NAME }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-terraform-apply-checks

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        run: |
          terraform plan -no-color -out=tfplan.binary
          terraform show -no-color tfplan.binary > tfplan.txt

      - name: Upload terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-plan-${{ github.run_id }}
          path: |
            terraform/tfplan.binary
            terraform/tfplan.txt
          retention-days: 7

  terraform_apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: terraform_checks
    environment: production

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_bucket_name: ${{ vars.BUCKET_NAME }}
      TF_VAR_bronze_prefix: ${{ vars.BRONZE_PREFIX }}
      TF_VAR_role_name: ${{ vars.ROLE_NAME }}
      TF_VAR_policy_name: ${{ vars.POLICY_NAME }}
      TF_VAR_storage_credential_name: ${{ vars.STORAGE_CREDENTIAL_NAME }}
      TF_VAR_external_location_name: ${{ vars.EXTERNAL_LOCATION_NAME }}
      TF_VAR_databricks_host: ${{ vars.DATABRICKS_HOST }}
      TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_databricks_principal_arn: ${{ vars.DATABRICKS_PRINCIPAL_ARN }}
      TF_VAR_databricks_external_id: ${{ vars.DATABRICKS_EXTERNAL_ID }}
      TF_VAR_databricks_group_name: ${{ vars.DATABRICKS_GROUP_NAME }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: gha-terraform-apply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: terraform apply -auto-approve -no-color
